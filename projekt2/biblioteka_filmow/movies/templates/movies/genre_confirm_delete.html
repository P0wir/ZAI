{% extends "base.html" %}

{% block content %}
<h2>Usuń gatunek</h2>

<p>Czy na pewno chcesz usunąć gatunek: <strong>{{ object.name }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Tak, usuń</button>
    <a href="{% url 'genre_detail' object.pk %}">Anuluj</a>
</form>
{% endblock %}
