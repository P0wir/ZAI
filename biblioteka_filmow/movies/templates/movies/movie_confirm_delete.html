{% extends "base.html" %}

{% block title %}
Usuń film
{% endblock %}

{% block content %}
<h2>Usuń film</h2>

<p>Czy na pewno chcesz usunąć film: <strong>{{ object.title }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Tak, usuń</button>
    <a href="{% url 'movie_detail' object.pk %}" class="btn btn-secondary">Anuluj</a>
</form>
{% endblock %}
